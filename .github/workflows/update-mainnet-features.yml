name: Update mainnet feature set

# Weekly refresh of the SvmFeatureConfig::default_mainnet_features() disable
# list. Queries mainnet-beta to detect features that are no longer inactive
# there, then opens a PR with the regenerated file. See
# crates/types/src/bin/update_mainnet_features.rs (the generator) and
# crates/types/src/mainnet_disabled_features.rs (the generated file).

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh mainnet feature disable list
    runs-on: ubuntu-latest
    steps:
      - name: Install apt dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-update-mainnet-features-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-update-mainnet-features-

      - name: Run feature updater
        run: |
          cargo run \
            -p surfpool-types \
            --bin update_mainnet_features \
            --features update-features-tool

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- crates/types/src/mainnet_disabled_features.rs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected:"
            git diff --stat -- crates/types/src/mainnet_disabled_features.rs
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh mainnet feature disable list"
          title: "chore: refresh mainnet feature disable list"
          body: |
            Automated weekly refresh of `SvmFeatureConfig::default_mainnet_features()`.

            `crates/types/src/mainnet_disabled_features.rs` has been regenerated
            from a fresh query against `https://api.mainnet-beta.solana.com`.
            How to read the diff:

            - A feature **dropping off** the list = it has become active on
              mainnet and should now be on by default for surfpool users.
            - A feature **appearing** on the list = `agave-feature-set` has
              introduced a new gate that is not yet live on mainnet.

            Not auto-merged — please review before merging. Generated by
            `.github/workflows/update-mainnet-features.yml`.
          branch: chore/update-mainnet-features
          delete-branch: true
          labels: |
            automated
            chore
